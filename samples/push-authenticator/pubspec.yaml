name: asgardeo_push_authenticator
description: "Asgardeo Push Authenticator — Push notification-based authentication sample for Asgardeo (WSO2 Identity Server)."
publish_to: 'none'

version: 1.0.0+1

# Workspace member — resolved against the root pubspec.lock.
resolution: workspace

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter
  asgardeo_push_auth: ^0.0.1
  cupertino_icons: ^1.0.9
  firebase_core: ^4.7.0
  firebase_messaging: ^16.2.0
  flutter_native_splash: ^2.4.7
  flutter_riverpod: ^3.3.1
  go_router: ^17.2.3
  http: ^1.6.0
  mobile_scanner: ^7.2.0
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo-icon.png"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/images/logo-icon.png"
  remove_alpha_ios: true

flutter_native_splash:
  color: "#ffffff"
  image: "assets/images/logo-icon.png"
  android_12:
    color: "#ffffff"
    icon_background_color: "#ffffff"
    image: "assets/images/logo-icon-splash-android.png"

flutter:
  uses-material-design: true

  assets:
    - assets/config/app_config.json
    - assets/images/
    - assets/certs/
