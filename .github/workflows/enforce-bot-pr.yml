# Fails the PR if any commit on the bot's chore/automated-release branch was
# authored by a human. The release branch is owned exclusively by 🦋 Release PR.

name: 🛡️ Enforce Bot-Only Release PR

on:
  pull_request:
    branches: [main]

jobs:
  guard:
    name: 🛡️ Guard chore/automated-release
    if: github.head_ref == 'chore/automated-release'
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 🔍 Verify all commits authored by github-actions[bot]
        run: |
          set -euo pipefail
          AUTHORS=$(git log origin/main..HEAD --format='%an' | sort -u)
          echo "Commit authors on this branch:"
          echo "$AUTHORS"

          if echo "$AUTHORS" | grep -qv '^github-actions\[bot\]$'; then
            echo ""
            echo "::error::Manual commits detected on chore/automated-release."
            echo "::error::This branch is owned exclusively by the 🦋 Release PR workflow."
            echo "::error::To fix a bug in the upcoming release:"
            echo "::error::  1. Revert your manual commits on this branch."
            echo "::error::  2. Open a separate PR against main with your fix."
            echo "::error::  3. The release PR will be regenerated automatically."
            exit 1
          fi

          echo "✅ All commits authored by github-actions[bot]."
