# Scans pubspec.lock for known vulnerabilities via Google's OSV-Scanner.
# `dart pub` has no native audit command, so we use the Dart-aware OSV scanner.

name: 🛡️ Security Audit

on:
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  audit:
    name: 🛡️ OSV Scan
    runs-on: ubuntu-latest
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🔍 Run OSV-Scanner
        uses: google/osv-scanner-action/osv-scanner-action@v2.0.0
        with:
          scan-args: |-
            --lockfile=pubspec.lock
            --recursive
            ./
