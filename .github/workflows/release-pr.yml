# On every push to main: compute Conventional-Commits-driven version bumps,
# regenerate the bot's release branch, and open or update the release PR.
# The bot is the sole producer of version bumps and CHANGELOG entries.

name: 🦋 Release PR

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency: ${{ github.workflow }}-${{ github.ref }}

env:
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  RELEASE_BRANCH: chore/automated-release

jobs:
  prepare:
    name: 📝 Prepare Release PR
    # Skip when the push is the bot's own merge commit, or when the author
    # explicitly opted out via "skip ci" in the message.
    if: "!contains(github.event.head_commit.message, 'chore(release):') && !contains(github.event.head_commit.message, 'skip ci')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: 💙 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: 🔆 Cache pub
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('pubspec.lock') }}

      - name: 🧩 Install workspace deps (root)
        run: dart pub get

      - name: 🍈 Bootstrap workspace
        run: dart run melos bootstrap

      - name: 🤖 Configure bot identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      # melos.command.version has generateCommit: false and updateGitTagRefs: false,
      # so this only modifies pubspec.yaml + CHANGELOG.md files on disk — no commits, no tags.
      - name: 🔢 Compute version bumps and CHANGELOG entries
        run: dart run melos version --yes

      - name: 🛑 Detect whether anything changed
        id: detect_changes
        run: |
          if git diff --quiet; then
            echo "No version bumps required (no release-worthy commits since last release)."
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: 🌿 Force-push release branch
        if: steps.detect_changes.outputs.has_changes == 'true'
        run: |
          git checkout -B "$RELEASE_BRANCH"
          git add -A
          git commit -m "chore(release): bump versions

          Generated by 🦋 Release PR workflow."
          git push --force origin "$RELEASE_BRANCH"

      - name: 📨 Create or update release PR
        if: steps.detect_changes.outputs.has_changes == 'true'
        run: |
          PR_BODY=$(cat <<'EOF'
          ## ⚠️ STOP! DO NOT PUSH TO THIS PR ⚠️

          This pull request is **generated and maintained automatically** by the
          `🦋 Release PR` workflow. Any manual commits pushed here will be
          **rejected by CI** (`enforce-bot-pr.yml`).

          ### If you need to fix a bug in this release
          - Open a **separate PR against `main`** with the fix.
          - Once merged, this PR will be **regenerated automatically** with the
            corrected version bumps and CHANGELOG entries.
          - **Never** push directly to `chore/automated-release`.

          ### What merging this PR does
          1. Triggers `🚀 Release` (`release.yml`).
          2. The publisher creates per-package Git tags (`<package>-v<version>`).
          3. Each publishable package is published to pub.dev via OIDC, in
             topological order, after `analyze` + `test` pass.

          ---

          The version bumps and changelog entries below were derived from
          Conventional Commits since the previous release.
          EOF
          )

          EXISTING=$(gh pr list \
            --head "$RELEASE_BRANCH" \
            --base main \
            --state open \
            --json number \
            --jq '.[0].number // empty')

          if [ -z "$EXISTING" ]; then
            gh pr create \
              --base main \
              --head "$RELEASE_BRANCH" \
              --title "chore(release): bump versions" \
              --body "$PR_BODY"
          else
            gh pr edit "$EXISTING" \
              --title "chore(release): bump versions" \
              --body "$PR_BODY"
          fi
